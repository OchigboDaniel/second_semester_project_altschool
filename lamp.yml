---
- name: Configure Web Server
  hosts: web
  become: true

#this task is for the web server
  tasks:
    - name: Update apt
      apt:
        update_cache: true

    - name: Install Apache + PHP
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
        state: present

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: true


- name: Configure Database Server
  hosts: db
  become: true

  tasks:
    - name: Update apt
      apt:
        update_cache: true

    - name: Install MySQL
      apt:
        name: mysql-server
        state: present

    - name: Start MySQL
      service:
        name: mysql
        state: started
        enabled: true
